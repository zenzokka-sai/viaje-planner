async function geocodeCity(name) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(name)}&limit=1&addressdetails=1`;
  const r = await fetch(url, {
    headers: {
      "Accept-Language": "es"
    }
  });
  const data = await r.json();
  if (!data[0]) return null;
  const cc = (data[0].address?.country_code || "").toLowerCase();
  return {
    name: data[0].address?.city || data[0].address?.town || data[0].address?.village || name,
    latlng: [parseFloat(data[0].lat), parseFloat(data[0].lon)],
    flag: FLAG_MAP[cc] || "🌍",
    country: data[0].address?.country || ""
  };
}
