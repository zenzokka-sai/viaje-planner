<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>✈️ Viaje Europa & Marruecos 2025</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=EB+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:#F8F2E6;font-family:'EB Garamond',Georgia,serif;color:#1C1008;}
    ::-webkit-scrollbar{width:5px;height:5px;}
    ::-webkit-scrollbar-thumb{background:#C8B89A;border-radius:3px;}
    input[type=date]::-webkit-calendar-picker-indicator,
    input[type=time]::-webkit-calendar-picker-indicator{opacity:0.4;cursor:pointer;}
    select option{background:#FFFFFF;color:#1C1008;}
    .leaflet-container{font-family:'EB Garamond',serif;}
    .leaflet-popup-content-wrapper{background:#FFFFFF;border:1px solid #E2D5C0;border-radius:10px;box-shadow:0 4px 20px rgba(28,16,8,0.12);}
    .leaflet-popup-content{font-family:'EB Garamond',serif;color:#1C1008;font-size:14px;}
    .leaflet-popup-tip{background:#FFFFFF;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
